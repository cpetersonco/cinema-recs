services:
  cinema-recs:
    image: ghcr.io/cpetersonco/cinema-recs:latest
    build: .
    container_name: cinema-recs
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      CINEMA_RECS_SOURCE_URL: "${CINEMA_RECS_SOURCE_URL:?set to the Cinepolis McKinney showtimes URL}"
      CINEMA_RECS_REFRESH_INTERVAL_HOURS: "${CINEMA_RECS_REFRESH_INTERVAL_HOURS:-3}"
      CINEMA_RECS_DATA_DIR: /data
      CINEMA_RECS_PORT: "8080"
      TMDB_API_KEY: "${TMDB_API_KEY:?set to your TMDB API v3 key}"
      LETTERBOXD_USERNAME: "${LETTERBOXD_USERNAME:-}"
      LETTERBOXD_RATING_THRESHOLD: "${LETTERBOXD_RATING_THRESHOLD:-}"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
      NOTIFICATIONS_ENABLED: "${NOTIFICATIONS_ENABLED:-true}"
      PUID: "${PUID:-99}"
      PGID: "${PGID:-100}"
    volumes:
      - ./data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped
